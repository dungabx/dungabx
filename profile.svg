<svg fill="none" viewBox="0 0 1200 400" width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#13141f" />
      <stop offset="50%" stop-color="#16161e" />
      <stop offset="100%" stop-color="#1a1b26" />
    </linearGradient>

    <!-- Name Highlight Text Gradient -->
    <linearGradient id="text-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7aa2f7" />
      <stop offset="100%" stop-color="#7dcfff" />
    </linearGradient>

    <!-- Typing Mask ClipPath -->
    <clipPath id="type-clip">
      <rect id="clip-rect" x="80" y="190" width="0" height="40" />
    </clipPath>
  </defs>

  <style>
    /* CSS Animations */
    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
    @keyframes traffic-forward {
      0% { stroke-dashoffset: 30; }
      100% { stroke-dashoffset: 0; }
    }
    @keyframes float-node {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-6px); }
    }
    @keyframes glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 4px #7aa2f7); }
      50% { filter: drop-shadow(0 0 12px #7aa2f7); }
    }
    @keyframes type-reveal {
      0%, 10% { width: 0; }
      90%, 100% { width: 440px; }
    }
    @keyframes cursor-move {
      0%, 10% { transform: translateX(0px); }
      90%, 100% { transform: translateX(440px); }
    }
    @keyframes cursor-blink {
      0%, 100% { opacity: 0; }
      50% { opacity: 1; }
    }

    /* Twinkling Stars */
    .star-sky {
      fill: #ffffff;
      animation: twinkle 3s infinite ease-in-out;
    }

    /* Text Styles */
    .font-base {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }
    .font-mono {
      font-family: 'Fira Code', 'Courier New', monospace;
    }
    .greeting {
      font-size: 15px;
      fill: #bb9af3;
      font-weight: 700;
      letter-spacing: 3px;
    }
    .full-name {
      font-size: 48px;
      font-weight: 800;
      fill: #ffffff;
      letter-spacing: -1px;
    }
    .typing-text {
      font-size: 19px;
      fill: #a9b1d6;
      font-weight: 500;
    }
    .tag-text {
      font-size: 12px;
      font-weight: 600;
      fill: #7dcfff;
    }

    /* Typographic Animation Controls */
    #clip-rect {
      animation: type-reveal 4s steps(40) infinite alternate;
    }
    #cursor {
      animation: cursor-blink 0.8s infinite, cursor-move 4s steps(40) infinite alternate;
    }

    /* SVG Graphical Elements Class Stylings */
    .mesh-line {
      stroke: rgba(122, 162, 247, 0.2);
      stroke-width: 1.5;
    }
    .active-path {
      stroke: #7aa2f7;
      stroke-width: 2;
      stroke-dasharray: 6 6;
      animation: traffic-forward 1.2s linear infinite;
    }
    .active-path-alt {
      stroke: #bb9af3;
      stroke-width: 2;
      stroke-dasharray: 6 6;
      animation: traffic-forward 1.8s linear infinite reverse;
    }
    .node-spine {
      fill: #7aa2f7;
      stroke: #16161e;
      stroke-width: 3;
      animation: glow-pulse 3s infinite ease-in-out;
    }
    .node-leaf {
      fill: #bb9af3;
      stroke: #16161e;
      stroke-width: 3;
      animation: float-node 4s infinite ease-in-out;
    }
    .node-text {
      fill: #a9b1d6;
      font-size: 11px;
      font-family: 'Fira Code', monospace;
      text-anchor: middle;
      font-weight: bold;
    }
  </style>

  <!-- Background Canvas -->
  <rect width="1200" height="400" fill="url(#bg-gradient)" />

  <!-- Twinkling Universe Background Stars -->
  <circle class="star-sky" cx="120" cy="40" r="1" style="animation-duration: 2.5s;" />
  <circle class="star-sky" cx="320" cy="150" r="1.5" style="animation-duration: 4s;" />
  <circle class="star-sky" cx="600" cy="60" r="0.8" style="animation-duration: 3.5s;" />
  <circle class="star-sky" cx="180" cy="280" r="1.2" style="animation-duration: 5s;" />
  <circle class="star-sky" cx="500" cy="340" r="1" style="animation-duration: 3s;" />
  <circle class="star-sky" cx="650" cy="220" r="0.8" style="animation-duration: 4.5s;" />
  <circle class="star-sky" cx="880" cy="80" r="1.2" style="animation-duration: 3s;" />
  <circle class="star-sky" cx="920" cy="320" r="1" style="animation-duration: 2.8s;" />
  <circle class="star-sky" cx="1100" cy="190" r="1.5" style="animation-duration: 4.2s;" />

  <!-- Left Panel Brand Content (100% Native SVG Elements - No foreignObject) -->
  <g transform="translate(0, 0)">
    <!-- Subtitle/Greeting -->
    <text class="font-base greeting" x="80" y="115">HELLO WORLD, I'M</text>

    <!-- Full Name -->
    <text class="font-base full-name" x="80" y="170">Huỳnh Văn <tspan fill="url(#text-gradient)">Dũng</tspan></text>

    <!-- Typing Text with ClipPath Mask -->
    <text class="font-mono typing-text" x="80" y="215" clip-path="url(#type-clip)">Future Network Engineer &amp; Researcher</text>
    
    <!-- Typing Cursor -->
    <rect id="cursor" x="80" y="198" width="3" height="22" fill="#7aa2f7" />

    <!-- Badges Row -->
    <!-- Tag 1: SDN & SD-WAN -->
    <rect x="80" y="260" width="160" height="32" rx="16" fill="#7dcfff" fill-opacity="0.1" stroke="#7dcfff" stroke-opacity="0.2" stroke-width="1" />
    <text class="font-base tag-text" x="160" y="280" text-anchor="middle">📡 SDN &amp; SD-WAN</text>

    <!-- Tag 2: Cryptography & P2P -->
    <rect x="252" y="260" width="195" height="32" rx="16" fill="#7dcfff" fill-opacity="0.1" stroke="#7dcfff" stroke-opacity="0.2" stroke-width="1" />
    <text class="font-base tag-text" x="349.5" y="280" text-anchor="middle">🔒 Cryptography &amp; P2P</text>

    <!-- Tag 3: Volleyball Athlete -->
    <rect x="459" y="260" width="185" height="32" rx="16" fill="#7dcfff" fill-opacity="0.1" stroke="#7dcfff" stroke-opacity="0.2" stroke-width="1" />
    <text class="font-base tag-text" x="551.5" y="280" text-anchor="middle">🏐 Volleyball Athlete</text>
  </g>

  <!-- Right Panel: Natively rendered Spine-Leaf Topology -->
  <g transform="translate(820, 50)">
    <!-- Spine-Leaf Fabric Connections -->
    <line class="mesh-line" x1="100" y1="80" x2="50" y2="200" />
    <line class="active-path" x1="100" y1="80" x2="150" y2="200" />
    <line class="mesh-line" x1="100" y1="80" x2="250" y2="200" />
    
    <line class="active-path-alt" x1="200" y1="80" x2="50" y2="200" />
    <line class="mesh-line" x1="200" y1="80" x2="150" y2="200" />
    <line class="active-path" x1="200" y1="80" x2="250" y2="200" />

    <!-- Spine Nodes (Core Switches) -->
    <circle class="node-spine" cx="100" cy="80" r="14" />
    <circle class="node-spine" cx="200" cy="80" r="14" />
    <text class="node-text" x="100" y="52">SPINE-01</text>
    <text class="node-text" x="200" y="52">SPINE-02</text>

    <!-- Leaf Nodes (Access Switches) -->
    <circle class="node-leaf" cx="50" cy="200" r="10" style="animation-delay: 0.2s;" />
    <circle class="node-leaf" cx="150" cy="200" r="10" style="animation-delay: 0.5s;" />
    <circle class="node-leaf" cx="250" cy="200" r="10" style="animation-delay: 0.8s;" />
    <text class="node-text" x="50" y="232" fill="#565f89">LEAF-01</text>
    <text class="node-text" x="150" y="232" fill="#565f89">LEAF-02</text>
    <text class="node-text" x="250" y="232" fill="#565f89">LEAF-03</text>
  </g>
</svg>
