<svg fill="none" viewBox="0 0 1200 400" width="1200" height="400" xmlns="http://www.w3.org/2000/svg">
  <foreignObject width="100%" height="100%">
    <div xmlns="http://www.w3.org/1999/xhtml">
      <style>
        /* CSS Keyframe Animations */
        @keyframes twinkle {
          0%, 100% { opacity: 0.2; transform: scale(0.8); }
          50% { opacity: 1; transform: scale(1.2); }
        }
        @keyframes traffic-forward {
          0% { stroke-dashoffset: 30; }
          100% { stroke-dashoffset: 0; }
        }
        @keyframes float-node {
          0%, 100% { transform: translateY(0px); }
          50% { transform: translateY(-6px); }
        }
        @keyframes typing-effect {
          from { width: 0; }
          to { width: 100%; }
        }
        @keyframes blink-caret {
          from, to { border-color: transparent; }
          50% { border-color: #7aa2f7; }
        }
        @keyframes glow-pulse {
          0%, 100% { filter: drop-shadow(0 0 4px #7aa2f7); }
          50% { filter: drop-shadow(0 0 12px #7aa2f7); }
        }

        /* Container Layout */
        .universe-container {
          font-family: 'Fira Code', 'Segoe UI', system-ui, sans-serif;
          width: 100%;
          height: 400px;
          background: linear-gradient(135deg, #13141f 0%, #16161e 50%, #1a1b26 100%);
          position: relative;
          overflow: hidden;
          display: flex;
          align-items: center;
          justify-content: space-between;
          padding: 0 80px;
          box-sizing: border-box;
        }

        /* Twinkling Stars */
        .star-sky {
          position: absolute;
          background-color: #ffffff;
          border-radius: 50%;
          animation: twinkle 3s infinite ease-in-out;
        }

        /* Left Content: Text & Badges */
        .left-content {
          z-index: 10;
          max-width: 650px;
        }
        .greeting {
          font-size: 16px;
          color: #bb9af3;
          font-weight: 600;
          text-transform: uppercase;
          letter-spacing: 2px;
          margin-bottom: 8px;
        }
        .full-name {
          font-size: 46px;
          font-weight: 800;
          color: #ffffff;
          margin: 0 0 12px 0;
          letter-spacing: -1px;
        }
        .full-name span {
          color: #7aa2f7;
          background: linear-gradient(to right, #7aa2f7 30%, #7dcfff 100%);
          -webkit-background-clip: text;
          -webkit-text-fill-color: transparent;
        }
        .typing-container {
          font-size: 20px;
          color: #a9b1d6;
          margin: 0 0 25px 0;
          height: 28px;
          display: flex;
          align-items: center;
        }
        .typing-writer {
          display: inline-block;
          overflow: hidden;
          white-space: nowrap;
          border-right: 3px solid #7aa2f7;
          animation: typing-effect 3.5s steps(40, end) infinite alternate, blink-caret 0.75s step-end infinite;
          width: 0;
        }
        .tagline-group {
          display: flex;
          gap: 12px;
        }
        .custom-tag {
          font-size: 12px;
          font-weight: 600;
          color: #7dcfff;
          background: rgba(125, 207, 255, 0.1);
          border: 1px solid rgba(125, 207, 255, 0.2);
          padding: 6px 14px;
          border-radius: 20px;
          letter-spacing: 0.5px;
        }

        /* Right Content: Animated Spine-Leaf Topology */
        .right-content {
          position: relative;
          width: 320px;
          height: 320px;
          z-index: 10;
        }
        .topology-svg {
          width: 100%;
          height: 100%;
        }
        .mesh-line {
          stroke: rgba(122, 162, 247, 0.2);
          stroke-width: 1.5;
        }
        .active-path {
          stroke: #7aa2f7;
          stroke-width: 2;
          stroke-dasharray: 6 6;
          animation: traffic-forward 1.2s linear infinite;
        }
        .active-path-alt {
          stroke: #bb9af3;
          stroke-width: 2;
          stroke-dasharray: 6 6;
          animation: traffic-forward 1.8s linear infinite reverse;
        }
        .node-spine {
          fill: #7aa2f7;
          stroke: #16161e;
          stroke-width: 3;
          animation: glow-pulse 3s infinite ease-in-out;
        }
        .node-leaf {
          fill: #bb9af3;
          stroke: #16161e;
          stroke-width: 3;
          animation: float-node 4s infinite ease-in-out;
        }
        .node-text {
          fill: #565f89;
          font-size: 10px;
          font-family: 'Fira Code', monospace;
          text-anchor: middle;
        }
      </style>

      <div class="universe-container">
        <!-- Twinkling Universe Background -->
        <div class="star-sky" style="top: 40px; left: 120px; width: 2px; height: 2px; animation-duration: 2.5s;"></div>
        <div class="star-sky" style="top: 150px; left: 320px; width: 3px; height: 3px; animation-duration: 4s;"></div>
        <div class="star-sky" style="top: 60px; left: 600px; width: 1.5px; height: 1.5px; animation-duration: 3.5s;"></div>
        <div class="star-sky" style="top: 280px; left: 180px; width: 2.5px; height: 2.5px; animation-duration: 5s;"></div>
        <div class="star-sky" style="top: 340px; left: 500px; width: 2px; height: 2px; animation-duration: 3s;"></div>
        <div class="star-sky" style="top: 220px; left: 650px; width: 1.5px; height: 1.5px; animation-duration: 4.5s;"></div>
        <div class="star-sky" style="top: 80px; left: 880px; width: 2.5px; height: 2.5px; animation-duration: 3s;"></div>
        <div class="star-sky" style="top: 320px; left: 920px; width: 2px; height: 2px; animation-duration: 2.8s;"></div>
        <div class="star-sky" style="top: 190px; left: 1100px; width: 3px; height: 3px; animation-duration: 4.2s;"></div>

        <!-- Left Panel -->
        <div class="left-content">
          <div class="greeting">Hello World, I'm</div>
          <h1 class="full-name">Huỳnh Văn <span>Dũng</span></h1>
          <div class="typing-container">
            <span class="typing-writer">Future Network Engineer &amp; Researcher</span>
          </div>
          <div class="tagline-group">
            <span class="custom-tag">📡 SDN &amp; SD-WAN</span>
            <span class="custom-tag">🔒 Cryptography &amp; P2P</span>
            <span class="custom-tag">🏐 Volleyball Athlete</span>
          </div>
        </div>

        <!-- Right Panel: Animated Spine-Leaf Topology -->
        <div class="right-content">
          <svg class="topology-svg" viewBox="0 0 300 300">
            <!-- Spine-Leaf Fabric Connections -->
            <!-- Spine 1 links -->
            <line class="mesh-line" x1="100" y1="80" x2="50" y2="200" />
            <line class="active-path" x1="100" y1="80" x2="150" y2="200" />
            <line class="mesh-line" x1="100" y1="80" x2="250" y2="200" />
            
            <!-- Spine 2 links -->
            <line class="active-path-alt" x1="200" y1="80" x2="50" y2="200" />
            <line class="mesh-line" x1="200" y1="80" x2="150" y2="200" />
            <line class="active-path" x1="200" y1="80" x2="250" y2="200" />

            <!-- Spine Nodes (Core Switches) -->
            <circle class="node-spine" cx="100" cy="80" r="14" />
            <circle class="node-spine" cx="200" cy="80" r="14" />
            <text class="node-text" x="100" y="60" fill="#a9b1d6">SPINE-01</text>
            <text class="node-text" x="200" y="60" fill="#a9b1d6">SPINE-02</text>

            <!-- Leaf Nodes (Access Switches) -->
            <circle class="node-leaf" cx="50" cy="200" r="10" style="animation-delay: 0.2s;" />
            <circle class="node-leaf" cx="150" cy="200" r="10" style="animation-delay: 0.5s;" />
            <circle class="node-leaf" cx="250" cy="200" r="10" style="animation-delay: 0.8s;" />
            <text class="node-text" x="50" y="230" fill="#565f89">LEAF-01</text>
            <text class="node-text" x="150" y="230" fill="#565f89">LEAF-02</text>
            <text class="node-text" x="250" y="230" fill="#565f89">LEAF-03</text>
          </svg>
        </div>
      </div>
    </div>
  </foreignObject>
</svg>
